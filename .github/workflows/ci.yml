name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Lint
        run: npx eslint src/

      - name: Type check & Build
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  test:
    runs-on: ubuntu-latest
    # Tests run against ONE shared live Supabase instance using fixed synthetic
    # fixture UUIDs. Two concurrent test jobs (e.g. a PR run plus its merge-to-main
    # push run, which start only seconds apart) race on the same rows: one job's
    # afterAll force_delete_test_project wipes the project another job is mid-test
    # on, causing FK violations and 0-row reads. Serialize all test jobs globally
    # so only one ever touches the DB at a time; queue (don't cancel) so the merge
    # run still executes after the PR run finishes.
    concurrency:
      group: live-supabase-tests
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Run tests
        run: npm test
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
